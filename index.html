<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View PDF</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      text-align: center;
    }

    .header {
      padding: 10px;
      background: #222;
      color: white;
    }

    .pdf-viewer {
      width: 100%;
      height: 90vh;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .download {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="header">
    <h2>George CV</h2>
  </div>

  <div class="pdf-viewer">
    <iframe src="./george.pdf"></iframe>
  </div>

  <div class="download">
    <a href="./george.pdf" download>Download PDF</a>
  </div>

</body>
</html>
